<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b93a3"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect x="0" y="0" width="960" height="560" rx="12" fill="#101013"/>
  <text x="24" y="36" fill="#f5f6f7" font-size="17" font-weight="700">Esports Props - System Architecture</text>
  <text x="24" y="56" fill="#8b93a3" font-size="12">esportsprops.com | Next.js on Vercel | Express API on Render | Python data pipeline</text>

  <!-- CLIENT -->
  <rect x="24" y="86" width="200" height="112" rx="10" fill="#17181c" stroke="#3a3b42"/>
  <text x="40" y="112" fill="#c6ff3a" font-size="11" font-weight="700" letter-spacing="1">CLIENT</text>
  <text x="40" y="134" fill="#f5f6f7" font-size="13" font-weight="600">Browser / Mobile web</text>
  <text x="40" y="154" fill="#8b93a3" font-size="11">React 18 + SWR polling (30s)</text>
  <text x="40" y="170" fill="#8b93a3" font-size="11">Zustand lineup store</text>

  <!-- VERCEL -->
  <rect x="290" y="72" width="280" height="180" rx="10" fill="#17181c" stroke="#3a3b42"/>
  <text x="306" y="98" fill="#c6ff3a" font-size="11" font-weight="700" letter-spacing="1">VERCEL - EDGE</text>
  <text x="306" y="120" fill="#f5f6f7" font-size="13" font-weight="600">Next.js 14 (packages/web)</text>
  <text x="306" y="140" fill="#8b93a3" font-size="11">Board / Lineups / Stats / Leaderboard</text>

  <rect x="306" y="154" width="248" height="40" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="318" y="171" fill="#f5f6f7" font-size="11" font-weight="600">/api/backend/[...path] proxy</text>
  <text x="318" y="186" fill="#8b93a3" font-size="10">same-origin, wakes sleeping API, no CORS</text>

  <rect x="306" y="202" width="248" height="36" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="318" y="218" fill="#f5f6f7" font-size="11" font-weight="600">Demo slate fallback</text>
  <text x="318" y="232" fill="#8b93a3" font-size="10">full product loop with zero infra dependencies</text>

  <!-- RENDER -->
  <rect x="640" y="72" width="296" height="180" rx="10" fill="#17181c" stroke="#3a3b42"/>
  <text x="656" y="98" fill="#c6ff3a" font-size="11" font-weight="700" letter-spacing="1">RENDER - API TIER</text>
  <text x="656" y="120" fill="#f5f6f7" font-size="13" font-weight="600">Express + Prisma (packages/api)</text>
  <text x="656" y="140" fill="#8b93a3" font-size="11">projections, entries, settlement, wallets</text>

  <rect x="656" y="154" width="264" height="40" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="668" y="171" fill="#f5f6f7" font-size="11" font-weight="600">PostgreSQL</text>
  <text x="668" y="186" fill="#8b93a3" font-size="10">players, matches, projections, entries, users</text>

  <rect x="656" y="202" width="264" height="36" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="668" y="218" fill="#f5f6f7" font-size="11" font-weight="600">Clerk - authentication</text>
  <text x="668" y="232" fill="#8b93a3" font-size="10">optional sign-in, guest wallets by default</text>

  <!-- DATA PIPELINE -->
  <rect x="24" y="300" width="912" height="152" rx="10" fill="#17181c" stroke="#3a3b42"/>
  <text x="40" y="326" fill="#c6ff3a" font-size="11" font-weight="700" letter-spacing="1">PYTHON DATA &amp; MODELING PIPELINE (packages/api/ml)</text>

  <rect x="40" y="342" width="196" height="92" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="52" y="362" fill="#f5f6f7" font-size="11" font-weight="600">Sources</text>
  <text x="52" y="380" fill="#8b93a3" font-size="10">VLR.gg scraper (Valorant)</text>
  <text x="52" y="395" fill="#8b93a3" font-size="10">BreakingPoint.gg (Call of Duty)</text>
  <text x="52" y="410" fill="#8b93a3" font-size="10">VCT historical archive</text>
  <text x="52" y="425" fill="#8b93a3" font-size="10">PandaScore fixtures (optional)</text>

  <rect x="276" y="342" width="196" height="92" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="288" y="362" fill="#f5f6f7" font-size="11" font-weight="600">Modeling</text>
  <text x="288" y="380" fill="#8b93a3" font-size="10">feature engineering (rolling form,</text>
  <text x="288" y="395" fill="#8b93a3" font-size="10">opponent strength, map counts)</text>
  <text x="288" y="410" fill="#8b93a3" font-size="10">RandomForest kills-per-round</text>
  <text x="288" y="425" fill="#8b93a3" font-size="10">scikit-learn, joblib artifacts</text>

  <rect x="512" y="342" width="196" height="92" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="524" y="362" fill="#f5f6f7" font-size="11" font-weight="600">Line setting &amp; settlement</text>
  <text x="524" y="380" fill="#8b93a3" font-size="10">odds_setter.py - publishes lines</text>
  <text x="524" y="395" fill="#8b93a3" font-size="10">judge.py - grades finished maps,</text>
  <text x="524" y="410" fill="#8b93a3" font-size="10">settles entries, credits payouts</text>
  <text x="524" y="425" fill="#8b93a3" font-size="10">scheduled crons (Render)</text>

  <rect x="748" y="342" width="172" height="92" rx="6" fill="#1f2026" stroke="#3a3b42"/>
  <text x="760" y="362" fill="#f5f6f7" font-size="11" font-weight="600">GitHub Actions</text>
  <text x="760" y="380" fill="#8b93a3" font-size="10">refresh-stats.yml (6h cron)</text>
  <text x="760" y="395" fill="#8b93a3" font-size="10">re-exports live_stats.json</text>
  <text x="760" y="410" fill="#8b93a3" font-size="10">commits to main,</text>
  <text x="760" y="425" fill="#8b93a3" font-size="10">auto-deploys via Vercel</text>

  <!-- ARROWS -->
  <line x1="224" y1="142" x2="284" y2="142" stroke="#8b93a3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="228" y="132" fill="#8b93a3" font-size="10">HTTPS</text>

  <line x1="570" y1="174" x2="634" y2="174" stroke="#8b93a3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="577" y="164" fill="#8b93a3" font-size="10">REST</text>

  <line x1="610" y1="336" x2="700" y2="258" stroke="#8b93a3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="292" fill="#8b93a3" font-size="10">writes lines / settles</text>

  <line x1="800" y1="336" x2="480" y2="258" stroke="#8b93a3" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="640" y="300" fill="#8b93a3" font-size="10">stats snapshot, redeploy</text>

  <line x1="236" y1="388" x2="270" y2="388" stroke="#8b93a3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="472" y1="388" x2="506" y2="388" stroke="#8b93a3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- footer -->
  <text x="24" y="492" fill="#8b93a3" font-size="11">Resilience: if the API tier is cold or unreachable, the Vercel proxy serves a deterministic in-repo demo slate so the</text>
  <text x="24" y="508" fill="#8b93a3" font-size="11">full pick / submit / settle loop remains demonstrable at all times. Play-money credits only; no real-money wagering.</text>
  <text x="24" y="540" fill="#63666f" font-size="10">CI: GitHub Actions build-verify on every push | Deploys: Vercel (web, packages/web root) + Render blueprint (render.yaml)</text>
</svg>
