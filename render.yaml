services:
  # --------------------------------------------------------------------------------
  # 1. Web Service: Esports Props API (Node.js)
  #    Canonical service name after Blueprint: kimi-api-9avy
  # --------------------------------------------------------------------------------
  - type: web
    name: kimi-api
    env: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@9.12.3 --activate && pnpm install --filter @app/api... --prod=false && pnpm --filter @app/api build
    startCommand: pnpm --filter @app/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: USE_DEMO
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: PANDA_SCORE_TOKEN
        sync: false

  # --------------------------------------------------------------------------------
  # 2. Cron Job: Judge — settle completed props
  # --------------------------------------------------------------------------------
  - type: cron
    name: judge-job
    env: python
    plan: starter
    region: oregon
    rootDir: .
    schedule: "*/15 * * * *"
    buildCommand: pip install -r packages/api/ml/requirements.txt
    startCommand: python packages/api/ml/judge.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_DEMO
        value: "1"
      - key: CRON_ENABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: PANDA_SCORE_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        fromService:
          type: web
          name: kimi-api
          envVarKey: ADMIN_TOKEN
      - key: INTERNAL_API_BASE
        value: https://kimi-api-9avy.onrender.com

  # --------------------------------------------------------------------------------
  # 3. Cron Job: Odds Setter — proprietary lines
  # --------------------------------------------------------------------------------
  - type: cron
    name: odds-setter-job
    env: python
    plan: starter
    region: oregon
    rootDir: .
    schedule: "*/30 * * * *"
    buildCommand: pip install -r packages/api/ml/requirements.txt
    startCommand: python packages/api/ml/odds_setter.py --limit-matches 25
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_DEMO
        value: "1"
      - key: CRON_ENABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: PANDA_SCORE_TOKEN
        sync: false
